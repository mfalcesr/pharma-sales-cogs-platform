version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw tables loaded from CSV files generated by the Python data generator."
    tables:
      - name: territories
        description: "Sales territory reference data."
        columns:
          - name: territory_id
            tests: [unique, not_null]

      - name: products
        description: "Pharma product catalog."
        columns:
          - name: product_id
            tests: [unique, not_null]
          - name: product_code
            tests: [unique, not_null]

      - name: customers
        description: "Customer accounts (hospitals, pharmacies, clinics)."
        columns:
          - name: customer_id
            tests: [unique, not_null]
          - name: segment
            tests:
              - accepted_values:
                  arguments:
                    values: ["Hospital", "Pharmacy", "Clinic"]
          - name: tier
            tests:
              - accepted_values:
                  arguments:
                    values: ["A", "B", "C"]

      - name: reps
        description: "Sales representatives."
        columns:
          - name: rep_id
            tests: [unique, not_null]

      - name: orders
        description: "Raw order lines (one row per order)."
        columns:
          - name: order_id
            tests: [unique, not_null]
          - name: order_date
            tests: [not_null]

      - name: costs
        description: "Monthly standard vs actual cost per product."
        columns:
          - name: cost_id
            tests: [unique, not_null]

      - name: returns
        description: "Product return records."
        columns:
          - name: return_id
            tests: [unique, not_null]

      - name: mrr_events
        description: "Monthly recurring revenue events (new, expansion, churn, reactivation)."
        columns:
          - name: event_id
            tests: [unique, not_null]
          - name: event_type
            tests:
              - accepted_values:
                  arguments:
                    values: ["new", "expansion", "contraction", "churn", "reactivation"]
