name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: pharma_db
          POSTGRES_USER: pharma_user
          POSTGRES_PASSWORD: pharma_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database schemas
        run: psql -h localhost -U pharma_user -d pharma_db -f init_schemas.sql
        env:
          PGPASSWORD: pharma_pass

      - name: Run pytest
        run: pytest tests/ -v
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: pharma_db
          POSTGRES_USER: pharma_user
          POSTGRES_PASSWORD: pharma_pass

      - name: Install dbt packages
        run: dbt deps --project-dir dbt --profiles-dir dbt

      - name: Compile dbt models
        run: dbt compile --project-dir dbt --profiles-dir dbt
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: pharma_db
          POSTGRES_USER: pharma_user
          POSTGRES_PASSWORD: pharma_pass
